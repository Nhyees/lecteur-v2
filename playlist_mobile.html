<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎧</text></svg>">
    <title>Playlist</title>
    <link rel="stylesheet" href="css/style_mobile.css">
</head>

<body>

    <!-- Zone scrollable : liste de chansons -->
    <div id="musicList">
        <input type="file" id="fileInput" accept=".json" aria-label="Importer une playlist JSON">
        <button id="exportButton" class="btn btn-secondary" aria-label="Exporter la playlist en JSON">💾</button>
        <h2>Liste des chansons</h2>
    </div>

    <!-- Barre de lecture fixee en bas -->
    <div id="mobile-player">

        <video id="videoPlayer" controls aria-label="Lecteur video"></video>
        <audio id="audioPlayer" controls style="display:none" aria-label="Lecteur audio"></audio>

        <div id="songInfo">
            <p class="song-anime" id="animeName"></p>
            <p class="song-title">
                <span id="songName"></span>
                <span class="song-sep" id="artistSep"> - </span>
                <span id="artistName"></span>
            </p>
        </div>

        <div class="controls">
            <button id="prevButton" class="btn" aria-label="Chanson precedente">⏮</button>
            <button id="randomButton" class="btn" aria-label="Mode aleatoire">🔀</button>
            <button id="nextButton" class="btn" aria-label="Chanson suivante">⏭</button>
        </div>

        <button id="clearButton" class="clear-button" aria-label="Vider la playlist">🗑️</button>
    </div>

    <!-- Champ masque pour la compatibilite JS -->
    <span id="typeName" style="display:none"></span>

    <script>
        window.PLAYER_CONFIG = {
            storageKey: "playlist",
            extraStorageKeys: ["playlist_wrongSongs"]
        };
    </script>
    <script src="js/script.js"></script>

</body>
</html>
