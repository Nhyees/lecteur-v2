<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎧</text></svg>">
    <title>Playlist</title>
    <link rel="stylesheet" href="css/style_mobile.css">
    <link rel="stylesheet" href="css/blindtest.css">
</head>

<body>

    <!-- Zone scrollable : liste de chansons -->
    <div id="musicList">


    </div>

    <!-- Barre de lecture fixee en bas -->
    <div id="mobile-player">

        <!-- Poignee : clic ou swipe bas pour replier, swipe haut pour ouvrir -->
        <div class="player-handle" aria-label="Replier ou agrandir le lecteur"></div>

        <!-- Zone repliable -->
        <div class="player-collapsible">
            <video id="videoPlayer" controls aria-label="Lecteur video"></video>
            <audio id="audioPlayer" controls style="display:none" aria-label="Lecteur audio"></audio>

            <div class="history-box" id="history-box" style="display:none">
                <div id="historyContainer"></div>
            </div>

            <div id="songInfo">
                <p class="song-anime" id="animeName"></p>
                <p class="song-title">
                    <span id="songName"></span>
                    <span class="song-sep"> - </span>
                    <span id="artistName"></span>
                </p>
            </div>
        </div>

        <!-- Controles toujours visibles -->
        <div class="controls">
            <button id="prevButton" class="btn" aria-label="Chanson precedente">⏮</button>
            <button id="randomButton" class="btn" aria-label="Activer ou desactiver le mode aleatoire">🎲</button>
            <button id="playPauseButton" class="btn" aria-label="Lire ou mettre en pause">▶</button>
            <button id="repeatButton" class="btn" aria-label="Activer ou desactiver la repetition">♾️</button>
            <button id="nextButton" class="btn" aria-label="Chanson suivante">⏭</button>
        </div>

        <button id="toggle-history" class="clear-button" aria-label="Afficher ou masquer l'historique">🎵</button>
    </div>

    <span id="typeName" style="display:none"></span>

    <script>
        window.PLAYER_CONFIG = {
            storageKey: "playlist",
            extraStorageKeys: ["playlist_wrongSongs"]
        };
    </script>
    <script src="js/script.js"></script>

</body>
</html>
