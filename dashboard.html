<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎵</text></svg>">
    <title>Playlists Communautaires</title>
    <link rel="stylesheet" href="css/style_dashboard.css">
</head>
<body>

    <!-- ── Écran de connexion ─────────────────────────────────── -->
    <div id="login-overlay" class="login-overlay">
        <div class="login-card">
            <div class="login-icon">🎵</div>
            <h1>Playlists Communautaires</h1>
            <p class="login-sub">Entre ton pseudo et le mot de passe</p>
            <div class="login-form">
                <input type="text" id="pseudo-input" class="input-field"
                       placeholder="Ton pseudo" maxlength="30" autocomplete="off">
                <input type="password" id="password-input" class="input-field"
                       placeholder="Mot de passe" autocomplete="off">
                <button id="login-btn" class="btn-primary">Entrer</button>
            </div>
            <button id="skip-login-btn" class="btn-ghost login-skip">Continuer sans se connecter</button>
            <a href="index.html" class="login-back">⬅ Retour à l'accueil</a>
        </div>
    </div>

    <!-- ── Application ───────────────────────────────────────── -->
    <div id="app" class="app" style="display:none">

        <header class="header">
            <div class="header-left">
                <a href="playlist.html" class="btn-ghost">⬅</a>
                <span class="header-title"></span>
            </div>
            <div class="header-right">
                <button id="login-header-btn" class="btn-primary sm" style="display:none">👤</button>
                <span id="user-chip" class="user-chip" style="display:none">👤 <span id="user-pseudo"></span></span>
                <button id="new-playlist-btn" class="btn-primary sm" style="display:none">+ Playlist</button>
                <button id="theme-btn" class="btn-icon" aria-label="Changer de thème">🫧</button>
                <button id="logout-btn" class="btn-ghost" style="display:none">Déconnexion</button>
            </div>
        </header>

        <!-- Vue : liste des playlists -->
        <div id="view-dashboard" class="view">
            <div class="view-header">
                <h2>Toutes les playlists</h2>
                <span id="playlist-count" class="count-chip"></span>
            </div>
            <div class="playlist-toolbar">
                <input type="text" id="playlist-search" class="input-field playlist-search-input" placeholder="Rechercher...">
                <div class="playlist-sort">
                    <button class="sort-btn pl-sort-btn" data-plsort="update">Update</button>
                    <button class="sort-btn pl-sort-btn active" data-plsort="title">Titre</button>
                </div>
            </div>
            <div id="playlist-grid" class="playlist-grid"></div>
            <p id="empty-dashboard" class="empty-msg" style="display:none">
                Aucune playlist pour l'instant — sois le premier ! 🎶
            </p>
        </div>

        <!-- Vue : détail d'une playlist -->
        <div id="view-playlist" class="view" style="display:none">
            <div class="view-header">
                <button id="back-btn" class="btn-ghost">⬅ Retour</button>
                <div class="playlist-heading">
                    <div class="detail-title-row">
                        <h2 id="detail-name"></h2>
                        <span id="detail-dates" class="detail-dates"></span>
                    </div>
                    <p id="detail-desc" class="text-muted"></p>
                </div>
                <div class="detail-right">
                    <span id="detail-owner" class="owner-chip"></span>
                    <div id="playlist-action-group" class="header-action-group" style="display:none">
                        <button id="open-in-player-btn" class="btn-ghost">+ Ajouter</button>
                        <button id="export-json-btn"    class="btn-ghost">⬇ .json</button>
                        <button id="edit-desc-btn"      class="btn-ghost" style="display:none">Modifier</button>
                        <button id="delete-playlist-btn" class="btn-danger" style="display:none">Supprimer</button>
                    </div>
                </div>
            </div>

            <div id="player-area" class="mini-player" style="display:none">
                <p class="player-now-playing">En cours de lecture</p>
                <span id="player-title" class="player-title"></span><span id="player-artist" class="player-artist"></span>
                <span id="player-subtitle" class="song-by"></span>
                <video id="player-video" controls style="display:none"></video>
                <audio id="player-audio" controls style="display:none"></audio>
            </div>

            <div id="add-song-card" class="add-song-card">
                <div class="add-song-header">
                    <label class="import-json-label" for="json-file-input">Importer un .json</label>
                    <input type="file" id="json-file-input" accept=".json" style="display:none">
                    <button id="toggle-add-song" class="add-song-toggle">
                        <span>Ajouter une musique</span>
                        <span class="toggle-chevron">▼</span>
                    </button>
                </div>
                <div id="add-song-body" class="add-song-body">
                    <div class="add-song-row add-song-meta">
                        <input type="text" id="song-title-input"  class="input-field" placeholder="Titre">
                        <input type="text" id="song-artist-input" class="input-field" placeholder="Artiste (optionnel)">
                        <input type="text" id="song-anime-input"  class="input-field" placeholder="Anime (optionnel)">
                        <input type="text" id="song-type-input"   class="input-field" placeholder="Type (ex: Opening 1)">
                    </div>
                    <div class="add-song-row">
                        <input type="url"  id="song-url-input"    class="input-field" placeholder="URL AMQ (https://naedist…) *">
                        <button id="add-song-btn" class="btn-primary">Ajouter</button>
                    </div>
                </div>
            </div>

            <div class="sort-bar">
                <span class="sort-label">Trier par</span>
                <button class="sort-btn active" data-sort="anime">Anime > Titre</button>
                <button class="sort-btn" data-sort="title">Titre</button>
                <button class="sort-btn" data-sort="default">Update</button>
            </div>

            <div id="song-list" class="song-list"></div>
            <p id="empty-playlist" class="empty-msg" style="display:none">
                Aucune chanson.
            </p>
        </div>

    </div>

    <!-- ── Modal : créer une playlist ────────────────────────── -->
    <div id="modal-create" class="modal-overlay" style="display:none">
        <div class="modal-card">
            <h2>Nouvelle playlist</h2>
            <div class="form-group">
                <label for="create-name">Nom</label>
                <input type="text" id="create-name" class="input-field"
                       placeholder="Nom de la playlist" maxlength="60">
            </div>
            <div class="form-group">
                <label for="create-desc">
                    Description <span class="optional">(optionnel)</span>
                </label>
                <textarea id="create-desc" class="input-field" rows="3"
                          placeholder="Une courte description…" maxlength="200"></textarea>
            </div>
            <div class="modal-actions">
                <button id="cancel-create-btn" class="btn-ghost">Annuler</button>
                <button id="confirm-create-btn" class="btn-primary">Créer</button>
            </div>
        </div>
    </div>

    <!-- ── Modal : modifier la description ──────────────────────── -->
    <div id="modal-edit" class="modal-overlay" style="display:none">
        <div class="modal-card">
            <h2>Modifier la description</h2>
            <div class="form-group">
                <label for="edit-desc">
                    Description <span class="optional">(optionnel)</span>
                </label>
                <textarea id="edit-desc" class="input-field" rows="3"
                          placeholder="Une courte description…" maxlength="200"></textarea>
            </div>
            <div class="modal-actions">
                <button id="cancel-edit-btn" class="btn-ghost">Annuler</button>
                <button id="confirm-edit-btn" class="btn-primary">Enregistrer</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast" aria-live="polite"></div>

    <!-- Supabase JS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
    (function () {
        // ── Config Supabase ──────────────────────────────────────────────────
        const SUPABASE_URL = 'https://hrqfykhakqngavtnxaxw.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_5LFQPCK28SzPwlGOYQ_fuA_18Qt54T9';

        // IMPORTANT : pour activer la suppression, ajoute ces politiques dans
        // l'éditeur SQL de Supabase :
        //
        //   create policy "delete playlists" on playlists for delete using (true);
        //   create policy "delete songs"     on songs     for delete using (true);

        const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const AMQ_BASES = [
            'https://naedist.animemusicquiz.com/',
            'https://eudist.animemusicquiz.com/',
        ];
        function stripAmqBase(url) {
            for (const base of AMQ_BASES) {
                if (url.startsWith(base)) return url.slice(base.length);
            }
            return url;
        }


        // ── Thèmes ────────────────────────────────────────────────────────────
        const THEMES     = ['', 'theme-girly', 'theme-orange'];
        const THEME_CSS  = ['css/style.css', 'css/style_girly.css', 'css/style_orange.css'];
        const THEME_KEY  = 'dashboard_theme';
        const USER_KEY   = 'dashboard_user';

        let themeIdx = parseInt(localStorage.getItem(THEME_KEY) ?? '0', 10);
        if (isNaN(themeIdx)) themeIdx = 0;
        // Sync depuis le lecteur si plus récent
        const savedCss = localStorage.getItem('selectedTheme');
        if (savedCss) { const ci = THEME_CSS.indexOf(savedCss); if (ci !== -1) themeIdx = ci; }
        applyTheme(themeIdx);

        function applyTheme(idx) {
            themeIdx = ((idx % THEMES.length) + THEMES.length) % THEMES.length;
            document.body.className = THEMES[themeIdx];
            localStorage.setItem(THEME_KEY, themeIdx);
            localStorage.setItem('selectedTheme', THEME_CSS[themeIdx]);
        }

        let sortMode = 'anime';
        let plSortMode = 'title';
        let plSearch = '';

        // ── État ──────────────────────────────────────────────────────────────
        const state = {
            user:            null,
            playlists:       [],
            currentPlaylist: null,
            songs:           [],
            currentSongIdx:  -1
        };

        // ── Refs DOM ──────────────────────────────────────────────────────────
        const $  = id => document.getElementById(id);
        const loginOverlay      = $('login-overlay');
        const app               = $('app');
        const pseudoInput       = $('pseudo-input');
        const viewDashboard     = $('view-dashboard');
        const viewPlaylist      = $('view-playlist');
        const playlistGrid      = $('playlist-grid');
        const playlistCount     = $('playlist-count');
        const emptyDashboard    = $('empty-dashboard');
        const detailName        = $('detail-name');
        const detailDesc        = $('detail-desc');
        const detailOwner       = $('detail-owner');
        const deletePlaylistBtn    = $('delete-playlist-btn');
        const playlistActionGroup  = $('playlist-action-group');
        const playerArea        = $('player-area');
        const playerTitle       = $('player-title');
        const playerVideo       = $('player-video');
        const playerAudio       = $('player-audio');
        const songList          = $('song-list');
        const emptyPlaylist     = $('empty-playlist');
        const modalCreate       = $('modal-create');
        const toastEl           = $('toast');
        let toastTimer;

        // ── Toast ─────────────────────────────────────────────────────────────
        function showToast(msg, type = 'info') {
            clearTimeout(toastTimer);
            toastEl.textContent = msg;
            toastEl.className = `toast visible toast-${type}`;
            toastTimer = setTimeout(() => toastEl.classList.remove('visible'), 3000);
        }

        // ── Connexion ─────────────────────────────────────────────────────────
        async function login(pseudo, password) {
            pseudo = pseudo.trim();
            if (!pseudo)            return showToast('Entre un pseudo', 'error');
            if (pseudo.length > 30) return showToast('Pseudo trop long (max 30 car.)', 'error');
            if (!password)          return showToast('Entre le mot de passe', 'error');

            const { data: cfg } = await db
                .from('config')
                .select('value')
                .eq('key', 'password')
                .single();
            if (!cfg || cfg.value !== password) return showToast('Mot de passe incorrect', 'error');

            const { data: existing } = await db
                .from('users')
                .select('id, pseudo, approved')
                .eq('pseudo', pseudo)
                .maybeSingle();

            let user;
            if (existing) {
                user = existing;
            } else {
                const { data, error } = await db
                    .from('users')
                    .insert({ pseudo })
                    .select('id, pseudo, approved')
                    .single();
                if (error) return showToast('Erreur lors de la connexion', 'error');
                user = data;
            }

            state.user = user;
            localStorage.setItem(USER_KEY, JSON.stringify(user));
            loginOverlay.style.display = 'none';
            pseudoInput.value = '';
            $('password-input').value = '';
            updateHeader();
            renderPlaylists();
            if (!user.approved) showToast('Connecté en lecture seule - accès non validé', 'info');
        }

        function logout() {
            localStorage.removeItem(USER_KEY);
            state.user = null;
            pseudoInput.value = '';
            updateHeader();
            renderPlaylists();
        }

        function startApp() {
            loginOverlay.style.display = 'none';
            app.style.display = 'flex';
            updateHeader();
            loadPlaylists();
        }

        function updateHeader() {
            const loggedIn  = !!state.user;
            const approved  = !!state.user?.approved;
            $('login-header-btn').style.display  = loggedIn ? 'none' : 'inline-flex';
            $('user-chip').style.display         = loggedIn ? 'inline-flex' : 'none';
            $('user-pseudo').textContent         = loggedIn ? state.user.pseudo : '';
            $('new-playlist-btn').style.display  = approved ? 'inline-flex' : 'none';
            $('logout-btn').style.display        = loggedIn ? 'inline-flex' : 'none';
        }

        // ── Playlists ─────────────────────────────────────────────────────────
        async function loadPlaylists() {
            const { data, error } = await db
                .from('playlists')
                .select('id, nom, description, user_id, created_at, updated_at, users(pseudo)')
                .order('id', { ascending: false });
            if (error) return showToast('Erreur de chargement', 'error');
            state.playlists = data || [];
            renderPlaylists();
        }

        function renderPlaylists() {
            playlistGrid.innerHTML = '';
            const q = plSearch.toLowerCase();
            let list = q
                ? state.playlists.filter(pl => pl.nom.toLowerCase().includes(q) || (pl.users?.pseudo || '').toLowerCase().includes(q))
                : [...state.playlists];
            if (plSortMode === 'title') {
                list.sort((a, b) => a.nom.localeCompare(b.nom, 'fr', { sensitivity: 'base' }));
            } else {
                list.sort((a, b) => new Date(b.updated_at || b.created_at) - new Date(a.updated_at || a.created_at));
            }
            const n = list.length;
            playlistCount.textContent = `${n} playlist${n !== 1 ? 's' : ''}`;
            emptyDashboard.style.display = n === 0 ? 'block' : 'none';

            list.forEach(pl => {
                const isOwner = state.user?.id === pl.user_id;
                const card = document.createElement('div');
                card.className = 'playlist-card';
                card.innerHTML = `
                    <h3 class="card-name">${esc(pl.nom)}</h3>
                    <p class="card-desc">${pl.description ? esc(pl.description) : ''}</p>
                    <div class="card-foot">
                        <span class="card-owner">👤 ${esc(pl.users?.pseudo || '?')}</span>
                        <span class="card-updated">${formatDateISO(pl.updated_at || pl.created_at)}</span>
                    </div>
                `;
                card.addEventListener('click', () => openPlaylist(pl));
                playlistGrid.appendChild(card);
            });
        }

        async function createPlaylist() {
            const nom = $('create-name').value.trim();
            if (!nom) return showToast('Donne un nom à ta playlist', 'error');
            const desc = $('create-desc').value.trim();

            const { data, error } = await db
                .from('playlists')
                .insert({ nom, description: desc || null, user_id: state.user.id, updated_at: new Date().toISOString() })
                .select('id, nom, description, user_id, created_at, updated_at, users(pseudo)')
                .single();
            if (error) return showToast('Erreur lors de la création', 'error');

            state.playlists.unshift(data);
            renderPlaylists();
            closeCreateModal();
            showToast('Playlist créée !', 'success');
        }

        async function deletePlaylist(id, onDone) {
            if (!confirm('Supprimer cette playlist et toutes ses chansons ?')) return;
            await db.from('songs').delete().eq('playlist_id', id);
            const { error } = await db.from('playlists').delete().eq('id', id);
            if (error) return showToast('Erreur lors de la suppression (vérifie les politiques Supabase)', 'error');
            state.playlists = state.playlists.filter(p => p.id !== id);
            renderPlaylists();
            showToast('Playlist supprimée', 'info');
            if (onDone) onDone();
        }

        // ── Détail playlist ───────────────────────────────────────────────────
        async function openPlaylist(pl) {
            state.currentPlaylist = pl;
            state.songs = [];
            songList.innerHTML = '';
            detailName.textContent  = pl.nom;
            detailDesc.textContent  = pl.description || '';
            detailOwner.textContent = `By ${pl.users?.pseudo || '?'}`;
            $('detail-dates').textContent = `created ${formatDate(pl.created_at)}${pl.updated_at ? ` ~ last updated ${formatDate(pl.updated_at)}` : ''}`;
            playlistActionGroup.style.display = 'flex';
            const isOwner = state.user?.approved && state.user?.id === pl.user_id;
            deletePlaylistBtn.style.display = isOwner ? 'inline-flex' : 'none';
            $('edit-desc-btn').style.display = isOwner ? 'inline-flex' : 'none';
            $('add-song-card').style.display = isOwner ? 'block' : 'none';

            document.querySelectorAll('.sort-btn').forEach(b => {
                b.classList.toggle('active', b.dataset.sort === sortMode);
            });

            viewDashboard.style.display = 'none';
            viewPlaylist.style.display  = 'block';
            await loadSongs(pl.id);
        }

        async function loadSongs(playlistId) {
            const { data, error } = await db
                .from('songs')
                .select('id, titre, url, song_data, user_id, users(pseudo)')
                .eq('playlist_id', playlistId)
                .order('id', { ascending: true });
            if (error) return showToast('Erreur chargement chansons', 'error');
            state.songs = data || [];
            const ownerPseudo = state.currentPlaylist.users?.pseudo || '?';
            const contributors = [...new Set(
                state.songs
                    .map(s => s.users?.pseudo)
                    .filter(p => p && p !== ownerPseudo)
            )];
            const allNames = [ownerPseudo, ...contributors].join(' & ');
            detailOwner.textContent = `By ${allNames}`;
            renderSongs();
        }

        function renderSongs() {
            songList.innerHTML = '';
            emptyPlaylist.style.display = state.songs.length === 0 ? 'block' : 'none';
            const isOwner = state.user?.approved && state.user?.id === state.currentPlaylist?.user_id;

            const songs = [...state.songs].sort((a, b) => {
                if (sortMode === 'title') {
                    return a.titre.localeCompare(b.titre, 'fr', { sensitivity: 'base' });
                }
                if (sortMode === 'anime') {
                    const animeA = a.song_data?.animeJPName || '';
                    const animeB = b.song_data?.animeJPName || '';
                    return animeA.localeCompare(animeB, 'fr', { sensitivity: 'base' }) || a.titre.localeCompare(b.titre, 'fr', { sensitivity: 'base' });
                }
                return 0;
            });

            songs.forEach((song, i) => {
                const sd = song.song_data;
                const artist  = sd?.songArtist || '';
                const subtitle = sd
                    ? [sd.animeJPName, sd.songType].filter(Boolean).join(' · ') || `ajouté par ${esc(song.users?.pseudo || '?')}`
                    : `ajouté par ${esc(song.users?.pseudo || '?')}`;
                const item = document.createElement('div');
                item.className = 'song-item';
                item.innerHTML = `
                    <span class="song-num">${i + 1}</span>
                    <div class="song-meta">
                        <div class="song-title-row">
                            <span class="song-title">${esc(song.titre)}</span>
                            ${artist ? `<span class="song-by">by ${esc(artist)}</span>` : ''}
                        </div>
                        <span class="song-by">${esc(subtitle)}</span>
                    </div>
                    <div class="song-btns">
                        <button class="btn-play" title="Lire">▶</button>
                        ${isOwner
                            ? `<button class="btn-icon song-del" title="Supprimer">❌</button>`
                            : ''}
                    </div>
                `;
                item.querySelector('.btn-play').addEventListener('click', () =>
                    playSong(song.url, song.titre, song.song_data, item));
                item.querySelector('.song-del')?.addEventListener('click', () =>
                    deleteSong(song.id));
                songList.appendChild(item);
            });
        }

        async function touchPlaylistUpdatedAt() {
            const now = new Date().toISOString();
            await db.from('playlists').update({ updated_at: now }).eq('id', state.currentPlaylist.id);
            state.currentPlaylist.updated_at = now;
            const idx = state.playlists.findIndex(p => p.id === state.currentPlaylist.id);
            if (idx !== -1) state.playlists[idx].updated_at = now;
        }

        async function addSong() {
            const titre  = $('song-title-input').value.trim();
            const url    = stripAmqBase($('song-url-input').value.trim());
            const artist = $('song-artist-input').value.trim();
            const anime  = $('song-anime-input').value.trim();
            const type   = $('song-type-input').value.trim();
            if (!titre || !url) return showToast("Remplis le titre et l'URL", 'error');

            const song_data = {
                songName: titre,
                ...(artist && { songArtist: artist }),
                ...(anime  && { animeJPName: anime }),
                ...(type   && { songType: type }),
                HQ: url
            };

            const { data, error } = await db
                .from('songs')
                .insert({ titre, url, song_data, playlist_id: state.currentPlaylist.id, user_id: state.user.id })
                .select('id, titre, url, song_data, user_id, users(pseudo)')
                .single();
            if (error) return showToast("Erreur lors de l'ajout", 'error');

            state.songs.push(data);
            await touchPlaylistUpdatedAt();
            renderSongs();
            $('song-title-input').value  = '';
            $('song-url-input').value    = '';
            $('song-artist-input').value = '';
            $('song-anime-input').value  = '';
            $('song-type-input').value   = '';
            showToast('Chanson ajoutée !', 'success');
        }

        async function deleteSong(id) {
            const { error } = await db.from('songs').delete().eq('id', id);
            if (error) return showToast('Erreur lors de la suppression', 'error');
            state.songs = state.songs.filter(s => s.id !== id);
            await touchPlaylistUpdatedAt();
            renderSongs();
            showToast('Chanson supprimée', 'info');
        }

        // ── Mini-lecteur ──────────────────────────────────────────────────────
        function playSong(url, titre, sd, itemEl) {
            state.currentSongIdx = state.songs.findIndex(s => s.url === url);
            const fullUrl = url.startsWith('http')
                ? url
                : 'https://eudist.animemusicquiz.com/' + url;
            const isVideo = /\.(mp4|webm|ogv)(\?|$)/i.test(fullUrl);

            document.querySelectorAll('.song-item.playing')
                .forEach(el => el.classList.remove('playing'));
            if (itemEl) itemEl.classList.add('playing');

            playerTitle.textContent = titre;
            const artist   = sd?.songArtist || '';
            const subParts = sd ? [sd.animeJPName, sd.songType].filter(Boolean).join(' · ') : '';
            $('player-artist').textContent   = artist;
            $('player-subtitle').textContent = subParts ? (artist ? '· ' + subParts : subParts) : '';
            playerArea.style.display = 'block';

            if (isVideo) {
                playerAudio.pause();
                playerAudio.style.display = 'none';
                playerVideo.src           = fullUrl;
                playerVideo.style.display = 'block';
                playerVideo.addEventListener('error', function() {
                    playerVideo.src           = '';
                    playerVideo.style.display = 'none';
                    playerAudio.src           = fullUrl;
                    playerAudio.style.display = 'block';
                    playerAudio.play().catch(() => {});
                }, { once: true });
                playerVideo.play().catch(() => {});
            } else {
                playerVideo.pause();
                playerVideo.style.display = 'none';
                playerAudio.src           = fullUrl;
                playerAudio.style.display = 'block';
                playerAudio.play().catch(() => {});
            }
        }

        function stopPlayer() {
            playerVideo.pause();
            playerAudio.pause();
            playerVideo.src          = '';
            playerAudio.src          = '';
            playerArea.style.display = 'none';
            document.querySelectorAll('.song-item.playing')
                .forEach(el => el.classList.remove('playing'));
        }

        // ── Import / Export / Lecteur ─────────────────────────────────────────
        function songToAMQ(song) {
            if (song.song_data) return song.song_data;
            return { songName: song.titre, audio: song.url };
        }

        async function addSongsFromJSON(file) {
            let songs;
            try {
                const text = await file.text();
                songs = JSON.parse(text);
            } catch {
                return showToast('Fichier JSON invalide', 'error');
            }
            if (!Array.isArray(songs)) songs = [songs];

            let added = 0;
            for (const s of songs) {
                const titre = s.songName || s.titre || '?';
                const url   = stripAmqBase(s.HQ || s.MQ || s.audio || s.url || '');
                if (!url) continue;
                const { data, error } = await db
                    .from('songs')
                    .insert({ titre, url, song_data: s,
                              playlist_id: state.currentPlaylist.id,
                              user_id: state.user.id })
                    .select('id, titre, url, song_data, user_id, users(pseudo)')
                    .single();
                if (!error) { state.songs.push(data); added++; }
            }
            if (added > 0) await touchPlaylistUpdatedAt();
            renderSongs();
            showToast(`${added} chanson${added !== 1 ? 's' : ''} importée${added !== 1 ? 's' : ''} !`, 'success');
        }

        function openInPlayer() {
            if (!state.songs.length) return showToast('Playlist vide', 'error');
            stopPlayer();
            const sortedSongs = [...state.songs].sort((a, b) => {
                if (sortMode === 'title') {
                    return a.titre.localeCompare(b.titre, 'fr', { sensitivity: 'base' });
                }
                if (sortMode === 'anime') {
                    const animeA = a.song_data?.animeJPName || '';
                    const animeB = b.song_data?.animeJPName || '';
                    return animeA.localeCompare(animeB, 'fr', { sensitivity: 'base' }) || a.titre.localeCompare(b.titre, 'fr', { sensitivity: 'base' });
                }
                return 0;
            });
            const amqSongs = sortedSongs.map(songToAMQ);
            const plName   = state.currentPlaylist.nom;
            let playlists  = {};
            try { playlists = JSON.parse(localStorage.getItem('playlists') || '{}'); } catch {}
            playlists[plName] = amqSongs;
            localStorage.setItem('playlists', JSON.stringify(playlists));
            localStorage.setItem('activePlaylist', plName);

            // Sync thème
            const themeMap = ['css/style.css', 'css/style_girly.css', 'css/style_orange.css'];
            localStorage.setItem('selectedTheme', themeMap[themeIdx] || 'css/style.css');

            // Sync volume
            const vol = playerVideo.volume ?? playerAudio.volume ?? 0.3;
            localStorage.setItem('savedVolume', vol);

            // Sync musique en cours
            if (state.currentSongIdx >= 0)
                localStorage.setItem('activeSongIndex', state.currentSongIdx);

            const isMobile = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent) || window.innerWidth <= 768;
            location.href = isMobile ? 'playlist_mobile.html' : 'playlist.html';
        }

        function exportJSON() {
            if (!state.songs.length) return showToast('Playlist vide', 'error');
            const amqSongs = state.songs.map(songToAMQ);
            const blob = new Blob([JSON.stringify(amqSongs, null, 2)], { type: 'application/json' });
            const a    = document.createElement('a');
            a.href     = URL.createObjectURL(blob);
            a.download = `${state.currentPlaylist.nom}.json`;
            a.click();
            URL.revokeObjectURL(a.href);
        }

        // ── Modal ─────────────────────────────────────────────────────────────
        function openCreateModal() {
            $('create-name').value = '';
            $('create-desc').value = '';
            modalCreate.style.display = 'flex';
            setTimeout(() => $('create-name').focus(), 50);
        }

        function closeCreateModal() {
            modalCreate.style.display = 'none';
        }

        // ── Édition de description ────────────────────────────────────────────
        function openEditModal(pl) {
            $('edit-desc').value = pl.description || '';
            $('modal-edit').dataset.playlistId = pl.id;
            $('modal-edit').style.display = 'flex';
            setTimeout(() => $('edit-desc').focus(), 50);
        }

        function closeEditModal() {
            $('modal-edit').style.display = 'none';
        }

        async function updateDescription(id, newDesc) {
            const now = new Date().toISOString();
            const { error } = await db
                .from('playlists')
                .update({ description: newDesc || null, updated_at: now })
                .eq('id', id);
            if (error) { console.error(error); return showToast('Erreur lors de la mise à jour', 'error'); }
            const idx = state.playlists.findIndex(p => p.id === id);
            if (idx !== -1) {
                state.playlists[idx].description = newDesc || null;
                state.playlists[idx].updated_at = now;
            }
            if (state.currentPlaylist?.id === id) {
                state.currentPlaylist.description = newDesc || null;
                state.currentPlaylist.updated_at = now;
                detailDesc.textContent = newDesc || '';
                $('detail-dates').textContent = `created ${formatDate(state.currentPlaylist.created_at)} ~ last updated ${formatDate(now)}`;
            }
            renderPlaylists();
            closeEditModal();
            showToast('Description mise à jour !', 'success');
        }

        // ── Formatage de date ─────────────────────────────────────────────────
        function formatDate(iso) {
            if (!iso) return '-';
            return new Date(iso).toLocaleDateString('fr-FR', { day: '2-digit', month: 'short', year: 'numeric' });
        }

        function formatDateISO(iso) {
            if (!iso) return '-';
            return new Date(iso).toISOString().slice(0, 10);
        }

        // ── Échappement HTML ──────────────────────────────────────────────────
        function esc(str) {
            return String(str)
                .replace(/&/g,  '&amp;')
                .replace(/</g,  '&lt;')
                .replace(/>/g,  '&gt;')
                .replace(/"/g,  '&quot;');
        }

        // ── Événements ────────────────────────────────────────────────────────
        $('login-btn').addEventListener('click', () => login(pseudoInput.value, $('password-input').value));
        pseudoInput.addEventListener('keydown', e => e.key === 'Enter' && $('password-input').focus());
        $('password-input').addEventListener('keydown', e => e.key === 'Enter' && login(pseudoInput.value, $('password-input').value));

        $('logout-btn').addEventListener('click', logout);
        $('theme-btn').addEventListener('click', () => applyTheme(themeIdx + 1));
        $('new-playlist-btn').addEventListener('click', openCreateModal);

        $('back-btn').addEventListener('click', () => {
            stopPlayer();
            playlistActionGroup.style.display = 'none';
            viewPlaylist.style.display  = 'none';
            viewDashboard.style.display = 'block';
        });

        $('edit-desc-btn').addEventListener('click', () => openEditModal(state.currentPlaylist));

        deletePlaylistBtn.addEventListener('click', () =>
            deletePlaylist(state.currentPlaylist.id, () => {
                stopPlayer();
                playlistActionGroup.style.display = 'none';
                viewPlaylist.style.display  = 'none';
                viewDashboard.style.display = 'block';
            })
        );

        $('toggle-add-song').addEventListener('click', () => {
            $('toggle-add-song').classList.toggle('open');
            $('add-song-body').classList.toggle('open');
        });

        $('add-song-btn').addEventListener('click', addSong);
        $('song-url-input').addEventListener('keydown', e => e.key === 'Enter' && addSong());

        $('open-in-player-btn').addEventListener('click', openInPlayer);
        $('export-json-btn').addEventListener('click', exportJSON);
        $('json-file-input').addEventListener('change', e => {
            const file = e.target.files[0];
            if (file) { addSongsFromJSON(file); e.target.value = ''; }
        });

        $('login-header-btn').addEventListener('click', () => {
            loginOverlay.style.display = 'flex';
            setTimeout(() => pseudoInput.focus(), 50);
        });
        $('skip-login-btn').addEventListener('click', () => {
            loginOverlay.style.display = 'none';
        });

        $('cancel-create-btn').addEventListener('click', closeCreateModal);
        $('confirm-create-btn').addEventListener('click', createPlaylist);
        $('create-name').addEventListener('keydown', e => e.key === 'Enter' && createPlaylist());
        modalCreate.addEventListener('click', e => e.target === modalCreate && closeCreateModal());

        document.querySelectorAll('.sort-btn[data-sort]').forEach(btn => {
            btn.addEventListener('click', () => {
                sortMode = btn.dataset.sort;
                document.querySelectorAll('.sort-btn[data-sort]').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderSongs();
            });
        });

        document.querySelectorAll('.pl-sort-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                plSortMode = btn.dataset.plsort;
                document.querySelectorAll('.pl-sort-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderPlaylists();
            });
        });

        $('playlist-search').addEventListener('input', e => {
            plSearch = e.target.value.trim();
            renderPlaylists();
        });

        $('cancel-edit-btn').addEventListener('click', closeEditModal);
        $('confirm-edit-btn').addEventListener('click', () => {
            const id = $('modal-edit').dataset.playlistId;
            updateDescription(id, $('edit-desc').value.trim());
        });
        $('modal-edit').addEventListener('click', e => e.target === $('modal-edit') && closeEditModal());

        // ── Init ──────────────────────────────────────────────────────────────
        const savedUser = localStorage.getItem(USER_KEY);
        if (savedUser) {
            try { state.user = JSON.parse(savedUser); } catch { localStorage.removeItem(USER_KEY); }
        }
        startApp();

    })();
    </script>

</body>
</html>
